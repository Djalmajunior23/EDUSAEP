<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EduDiagnóstico SAEP</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎓</text></svg>">
    <script>
      // Silencia erros conhecidos de extensões de terceiros que poluem o console
      const originalError = console.error;
      console.error = (...args) => {
        const msg = args[0] ? String(args[0]) : '';
        if (
          msg.includes('chrome-extension') || 
          msg.includes('pinComponent.js') || 
          msg.includes('Empty token!') ||
          msg.includes('PIN Company Discounts') ||
          msg.includes('[vite]') ||
          msg.includes('WebSocket')
        ) {
          return;
        }
        originalError.apply(console, args);
      };

      const originalWarn = console.warn;
      console.warn = (...args) => {
        const msg = args[0] ? String(args[0]) : '';
        if (msg.includes('blacklist and siteRules') || msg.includes('WebChannelConnection')) {
          return;
        }
        originalWarn.apply(console, args);
      };

      window.addEventListener('unhandledrejection', (event) => {
        const reason = event.reason;
        if (
          reason === 'WebSocket closed without opened.' ||
          (reason && typeof reason === 'string' && reason.toLowerCase().includes('websocket')) ||
          (reason && reason.message && reason.message.toLowerCase().includes('websocket'))
        ) {
          event.preventDefault();
          event.stopPropagation();
          event.stopImmediatePropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
